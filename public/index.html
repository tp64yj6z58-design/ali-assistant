<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ali Assistant</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app">
      <section class="workspace">
        <section class="hero panel">
          <div class="heroContent">
            <div class="brandMark">
              <span>AI</span>
            </div>
            <p class="eyebrow">AliExpress AI Shopping Agent</p>
            <h1>מצא את 3 המוצרים הכי שווים בלי לחפור באליאקספרס</h1>
            <p class="summary">כתוב מה אתה מחפש. הסוכן בודק מוצרים דומים, מסנן תוצאות לא קשורות ומציג רק את האפשרויות הכי חזקות.</p>
            <div class="trustRow" aria-label="יתרונות">
              <span>סינון מוצרים לא קשורים</span>
              <span>מחיר + דירוג + הזמנות</span>
              <span>בחירה מהירה יותר</span>
            </div>
            <div id="status" class="status">בודק חיבור...</div>
          </div>
          <div class="heroPreview" aria-hidden="true">
            <div class="heroImageCard">
              <img src="/hero-shopping.jpg" alt="">
            </div>
            <div class="previewCard previewCardFloat">
              <span class="miniBadge">AI</span>
              <p>בודק, מסנן ומדרג לפני שאתה לוחץ.</p>
            </div>
          </div>
        </section>

        <div class="panel search">
          <form id="searchForm" class="searchForm">
            <label for="query">מה הלקוח מחפש?</label>
            <div class="searchRow">
              <input id="query" name="query" autocomplete="off" placeholder="לדוגמה: מטען מהיר לרכב עם USB-C" required>
              <button type="submit">חפש</button>
            </div>
            <div class="exampleChips" aria-label="דוגמאות חיפוש">
              <button type="button" data-query="מטען לרכב">מטען לרכב</button>
              <button type="button" data-query="אוזניות בלוטוס">אוזניות בלוטוס</button>
              <button type="button" data-query="car charger">car charger</button>
            </div>
          </form>
        </div>

        <section id="results" class="results" aria-live="polite"></section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
