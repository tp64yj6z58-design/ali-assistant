services:
  - type: web
    name: ali-assistant
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALIEXPRESS_APP_KEY
        sync: false
      - key: ALIEXPRESS_APP_SECRET
        sync: false
      - key: ALIEXPRESS_TRACKING_ID
        sync: false
      - key: ALIEXPRESS_SHIP_TO
        value: IL
      - key: ALIEXPRESS_TARGET_CURRENCY
        value: ILS
      - key: ALIEXPRESS_TARGET_LANGUAGE
        value: EN
